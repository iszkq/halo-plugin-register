name: CD

on:
  release:
    types:
      - published

jobs:
  cd:
    uses: halo-sigs/reusable-workflows/.github/workflows/plugin-cd.yaml@v3
    permissions:
      contents: write
    secrets: inherit
    with:
      pnpm-version: 9
      node-version: 22
      ui-path: ui
      skip-node-setup: true
      java-version: 21
      app-id: app-9lsqrhpl
      skip-appstore-release: false
