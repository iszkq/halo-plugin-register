apiVersion: v1alpha1
kind: Setting
metadata:
  name: invite-register-settings
spec:
  forms:
    - group: general
      label: 基础设置
      formSchema:
        - $formkit: checkbox
          name: enabled
          id: enabled
          key: enabled
          label: 启用邀请码注册
          value: true
        - $formkit: text
          name: inviteFieldName
          id: inviteFieldName
          key: inviteFieldName
          label: 邀请码字段名
          value: inviteCode
          validation: required|length:1,64
        - $formkit: text
          name: inputLabel
          id: inputLabel
          key: inputLabel
          label: 邀请码标题
          value: 邀请码
        - $formkit: text
          name: inputPlaceholder
          id: inputPlaceholder
          key: inputPlaceholder
          label: 邀请码占位提示
          value: 请输入邀请码
        - $formkit: textarea
          name: inputHelpText
          id: inputHelpText
          key: inputHelpText
          label: 邀请码说明
          value: 注册前请先向站长申请邀请码。
          rows: 2
        - $formkit: textarea
          name: invalidMessage
          id: invalidMessage
          key: invalidMessage
          label: 无效邀请码提示
          value: 邀请码无效、已过期或已被用尽。
          rows: 2
        - $formkit: radio
          name: brandSource
          id: brandSource
          key: brandSource
          label: 页面品牌来源
          help: 跟随站点设置时会优先读取站点标题和图标，读取不到则回退为默认 Halo；使用自定义品牌时按下方配置渲染。
          value: site
          options:
            - label: 跟随站点设置
              value: site
            - label: 使用自定义品牌
              value: custom
        - $formkit: text
          name: brandName
          id: brandName
          key: brandName
          label: 自定义品牌名称
          help: 仅在“使用自定义品牌”时生效，留空会显示默认 Halo。
          value: ""
        - $formkit: attachment
          name: brandLogo
          id: brandLogo
          key: brandLogo
          label: 自定义品牌 Logo
          help: 仅在“使用自定义品牌”时生效，可上传、从附件库选择，或输入链接。留空会显示默认 Halo 标识。
          accepts:
            - image/*
          width: 240
          value: ""
        - $formkit: textarea
          name: contactInfo
          id: contactInfo
          key: contactInfo
          label: 站长联系方式说明
          help: 支持填写文字联系方式，例如微信号、邮箱、说明文字。留空且未配置联系图片时，前台不会显示“联系站长”入口。
          value: ""
          rows: 4
        - $formkit: attachment
          name: contactImage
          id: contactImage
          key: contactImage
          label: 站长联系图片
          help: 可上传、从附件库选择，或输入链接。适合放二维码、名片图等。
          accepts:
            - image/*
          width: 240
          value: ""
        - $formkit: textarea
          name: registrationPagePatterns
          id: registrationPagePatterns
          key: registrationPagePatterns
          label: 注册页面路径
          help: 一行一个，支持 Ant 风格路径，例如 /register、/uc/register、/signup
          value: |-
            /register
            /uc/register
            /signup
          rows: 4
        - $formkit: textarea
          name: registrationApiPatterns
          id: registrationApiPatterns
          key: registrationApiPatterns
          label: 注册提交路径
          help: 一行一个，插件会拦截这些 POST 请求并校验邀请码。
          value: |-
            /signup
            /apis/uc.api.registration.halo.run/v1alpha1/register
            /apis/uc.api.halo.run/v1alpha1/register
            /apis/api.uc.halo.run/v1alpha1/register
          rows: 5
